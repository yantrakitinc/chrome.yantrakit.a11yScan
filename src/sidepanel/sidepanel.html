<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A11y Scan</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <img src="icons/icon16.png" alt="" width="20" height="20">
      <span class="brand">A11y Scan</span>
      <span class="beta-badge">Beta</span>
    </div>
    <div class="header-right">
      <select id="cvd-select" aria-label="Color vision simulation">
        <option value="">Normal vision</option>
        <option value="protanopia">Protanopia</option>
        <option value="deuteranopia">Deuteranopia</option>
        <option value="tritanopia">Tritanopia</option>
        <option value="protanomaly">Protanomaly</option>
        <option value="deuteranomaly">Deuteranomaly</option>
        <option value="tritanomaly">Tritanomaly</option>
        <option value="achromatopsia">Achromatopsia</option>
        <option value="achromatomaly">Achromatomaly</option>
      </select>
    </div>
  </header>

  <!-- Confirm Clear All Bar (F22) -->
  <div id="confirm-clear-bar" role="alert" aria-live="assertive" hidden>
    <p id="confirm-clear-text">This will clear all scan results, observer history, crawl data, chat history, and saved configuration. This action cannot be undone.</p>
    <div class="confirm-clear-actions">
      <button id="confirm-clear-yes">Yes, clear all</button>
      <button id="confirm-clear-cancel">Cancel</button>
    </div>
  </div>

  <!-- Top Tabs -->
  <nav id="top-tabs" role="tablist">
    <button role="tab" aria-selected="true" data-tab="scan" class="tab active">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
      <span>Scan</span>
    </button>
    <button role="tab" aria-selected="false" data-tab="sr" class="tab">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6h3l4-3v10L5 10H2V6z"/><path d="M11.5 5c1.2 1 1.8 2.3 1.8 3s-.6 2-1.8 3"/></svg>
      <span>Screen Reader</span>
    </button>
    <button role="tab" aria-selected="false" data-tab="kb" class="tab">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="1" y="4" width="14" height="8" rx="1.5"/><path d="M4.5 10h7"/><circle cx="4.5" cy="7" r=".6" fill="currentColor" stroke="none"/><circle cx="8" cy="7" r=".6" fill="currentColor" stroke="none"/><circle cx="11.5" cy="7" r=".6" fill="currentColor" stroke="none"/></svg>
      <span>Keyboard</span>
    </button>
    <!-- AI Chat tab — coming soon -->
    <button role="tab" aria-selected="false" data-tab="ai" class="tab" disabled style="opacity:0.4;cursor:not-allowed;position:relative" title="Coming soon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 10a1 1 0 01-1 1H5l-3 3V3a1 1 0 011-1h10a1 1 0 011 1v7z"/><path d="M5 6h6M5 8.5h3"/></svg>
      <span>AI Chat</span>
      <span style="font-size:7px;font-weight:800;color:#b45309;position:absolute;top:2px;right:2px;background:#fef3c7;border:1px solid #fcd34d;border-radius:3px;padding:0 2px;line-height:1.4">SOON</span>
    </button>
  </nav>

  <!-- Tab Content Panels -->
  <div id="tab-panels">
    <!-- Scan Tab -->
    <div id="panel-scan" class="tab-panel active" role="tabpanel"></div>
    <!-- Screen Reader Tab -->
    <div id="panel-sr" class="tab-panel" role="tabpanel" hidden></div>
    <!-- Keyboard Tab -->
    <div id="panel-kb" class="tab-panel" role="tabpanel" hidden></div>
    <!-- AI Chat Tab — hidden until Chrome AI is reliable -->
    <div id="panel-ai" class="tab-panel" role="tabpanel" hidden></div>
  </div>

  <!-- Footer -->
  <footer id="footer">
    A11y Scan <b>beta</b> · <a href="https://a11yscan.yantrakit.com/support" target="_blank" rel="noopener noreferrer">Feedback</a>
  </footer>

  <!-- Test Configuration Modal (F13) -->
  <dialog id="config-dialog" aria-label="Test Configuration">
    <div id="config-dialog-content"></div>
  </dialog>

  <script src="sidepanel.js"></script>
</body>
</html>
