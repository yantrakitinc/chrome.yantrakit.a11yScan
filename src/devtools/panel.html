<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>A11y Scan — Element Inspector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 12px;
      color: #1e1b4b;
      background: #fff;
      padding: 8px;
    }
    #status {
      font-size: 11px;
      color: #71717a;
      padding: 8px 0;
    }
    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #71717a;
      margin-top: 10px;
      margin-bottom: 3px;
    }
    .value {
      font-size: 12px;
      color: #18181b;
      word-break: break-word;
    }
    .aria-row {
      font-size: 11px;
      color: #3730a3;
      margin-bottom: 2px;
    }
    .focusable-yes { color: #047857; font-weight: 700; }
    .focusable-no { color: #b91c1c; font-weight: 700; }
    .violation-item {
      margin-top: 4px;
      padding: 6px 8px;
      border: 1px solid #fecaca;
      background: #fef2f2;
      border-radius: 4px;
    }
    .violation-rule {
      font-size: 11px;
      font-weight: 700;
      color: #dc2626;
    }
    .violation-impact {
      font-size: 10px;
      color: #b91c1c;
      margin-left: 6px;
    }
    .violation-msg {
      font-size: 11px;
      color: #3f3f46;
      margin-top: 2px;
      word-break: break-word;
    }
    button {
      min-height: 24px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid #d4d4d8;
      background: #fafafa;
      color: #3f3f46;
      margin-top: 10px;
    }
    button:hover { background: #f4f4f5; }
  </style>
</head>
<body>
  <div id="content">
    <div id="status">Select an element in the Elements panel.</div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
